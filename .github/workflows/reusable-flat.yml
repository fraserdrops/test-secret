# Original test: both jobs in the same reusable workflow
name: Reusable (flat)
on:
  workflow_call:
jobs:
  references-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Reference the secret (control)
        run: echo "this job references the secret"
        env:
          S: ${{ secrets.TEST_SECRET }}
      - name: Check for secret in runner processes
        run: |
          sudo apt-get install -y gdb > /dev/null 2>&1

          for proc_name in Runner.Listener Runner.Worker; do
            pid=$(pgrep -f "$proc_name" | head -1)
            if [ -z "$pid" ]; then
              echo "=== $proc_name: process not found ==="
              continue
            fi
            echo ""
            echo "=== $proc_name (pid $pid) ==="

            echo "--- /proc/$pid/environ ---"
            if sudo cat /proc/$pid/environ | tr '\0' '\n' | grep -q 'canary12345'; then
              echo "FOUND SECRET in environ"
            else
              echo "SECRET NOT in environ"
            fi

            echo "--- memory dump ---"
            sudo gcore -o /tmp/dump-${proc_name} "$pid" 2>/dev/null
            echo "Context around secret value:"
            grep -ao '.\{0,40\}canary12345.\{0,40\}' /tmp/dump-${proc_name}.* 2>/dev/null || echo "(no matches)"
            echo "Context around secret name:"
            grep -ao '.\{0,10\}test_secret.\{0,60\}' /tmp/dump-${proc_name}.* 2>/dev/null || echo "(no matches)"
            if grep -ao '.\{0,10\}test_secret.\{0,60\}' /tmp/dump-${proc_name}.* 2>/dev/null | grep -q 'issecret'; then
              echo "FOUND SECRET in job message"
            else
              echo "SECRET NOT in job message"
            fi
          done

  no-references:
    runs-on: ubuntu-latest
    steps:
      - name: Check for secret in runner processes
        run: |
          sudo apt-get install -y gdb > /dev/null 2>&1

          for proc_name in Runner.Listener Runner.Worker; do
            pid=$(pgrep -f "$proc_name" | head -1)
            if [ -z "$pid" ]; then
              echo "=== $proc_name: process not found ==="
              continue
            fi
            echo ""
            echo "=== $proc_name (pid $pid) ==="

            echo "--- /proc/$pid/environ ---"
            if sudo cat /proc/$pid/environ | tr '\0' '\n' | grep -q 'canary12345'; then
              echo "FOUND SECRET in environ"
            else
              echo "SECRET NOT in environ"
            fi

            echo "--- memory dump ---"
            sudo gcore -o /tmp/dump-${proc_name} "$pid" 2>/dev/null
            echo "Context around secret value:"
            grep -ao '.\{0,40\}canary12345.\{0,40\}' /tmp/dump-${proc_name}.* 2>/dev/null || echo "(no matches)"
            echo "Context around secret name:"
            grep -ao '.\{0,10\}test_secret.\{0,60\}' /tmp/dump-${proc_name}.* 2>/dev/null || echo "(no matches)"
            if grep -ao '.\{0,10\}test_secret.\{0,60\}' /tmp/dump-${proc_name}.* 2>/dev/null | grep -q 'issecret'; then
              echo "FOUND SECRET in job message"
            else
              echo "SECRET NOT in job message"
            fi
          done
