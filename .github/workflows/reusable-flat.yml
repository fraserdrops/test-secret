# Original test: both jobs in the same reusable workflow
name: Reusable (flat)
on:
  workflow_call:
jobs:
  references-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Reference the secret (control)
        run: echo "this job references the secret"
        env:
          S: ${{ secrets.TEST_SECRET }}
      - name: Dump Runner.Listener memory and grep for canary
        run: |
          sudo apt-get install -y gdb
          pid=$(pgrep -f 'Runner.Listener' | head -1)
          sudo gcore -o /tmp/memdump "$pid"
          echo "=== Match count ==="
          grep -c 'canary12345' /tmp/memdump.* || echo "NOT FOUND"
          echo "=== Match context ==="
          grep -ao '.\{0,40\}canary12345.\{0,40\}' /tmp/memdump.* || echo "NO CONTEXT"
          if grep -ao '.\{0,60\}canary12345.\{0,60\}' /tmp/memdump.* | grep -q 'issecret'; then
            echo "FOUND SECRET in job message"
          else
            echo "SECRET NOT in job message (matches are just grep commands)"
          fi

  no-references:
    runs-on: ubuntu-latest
    steps:
      - name: Dump Runner.Listener memory and grep for canary
        run: |
          sudo apt-get install -y gdb
          pid=$(pgrep -f 'Runner.Listener' | head -1)
          sudo gcore -o /tmp/memdump "$pid"
          echo "=== Match count ==="
          grep -c 'canary12345' /tmp/memdump.* || echo "NOT FOUND"
          echo "=== Match context ==="
          grep -ao '.\{0,40\}canary12345.\{0,40\}' /tmp/memdump.* || echo "NO CONTEXT"
          if grep -ao '.\{0,60\}canary12345.\{0,60\}' /tmp/memdump.* | grep -q 'issecret'; then
            echo "FOUND SECRET in job message"
          else
            echo "SECRET NOT in job message (matches are just grep commands)"
          fi
